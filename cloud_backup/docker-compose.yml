services:
  backup-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-backup-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      CLOUD_BACKUP_CONFIG_FILE: /data/config/config.json
      CLOUD_BACKUP_STATE_DIR: /data/state
      CLOUD_BACKUP_LOG_DIR: /data/logs
      CLOUD_BACKUP_RCLONE_CONFIG: /data/rclone/rclone.conf
      CLOUD_BACKUP_MDSTAT_FILE: /host/proc/mdstat
      CLOUD_BACKUP_DISK_HEALTH_FILE: /health/disk-health.json
      CLOUD_BACKUP_HOSTNAME: ${CLOUD_BACKUP_HOSTNAME:-homelab}
    volumes:
      - ${CLOUD_BACKUP_DATA_DIR:-./data}:/data
      - ./scripts:/scripts:ro
      - ../disk-health:/opt/disk-health:ro
      - ${PRIMARY_SOURCE_PATH:-/mnt/raid1}:/source/raid1:ro
      - ${SECONDARY_SOURCE_PATH:-/mnt/m2}:/source/m2:ro
      - /proc/mdstat:/host/proc/mdstat:ro
    networks:
      - backup-net
    command: ["python3", "-m", "app.engine_server"]
    healthcheck:
      test: ["CMD", "python3", "-m", "app.operation_cli", "healthcheck"]
      interval: 2m
      timeout: 20s
      retries: 3
      start_period: 20s

  backup-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-backup-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      CLOUD_BACKUP_CONFIG_FILE: /data/config/config.json
      CLOUD_BACKUP_STATE_DIR: /data/state
      CLOUD_BACKUP_LOG_DIR: /data/logs
      CLOUD_BACKUP_RCLONE_CONFIG: /data/rclone/rclone.conf
      CLOUD_BACKUP_ENGINE_URL: http://backup-engine:8091
    volumes:
      - ${CLOUD_BACKUP_DATA_DIR:-./data}:/data
    depends_on:
      - backup-engine
    networks:
      - backup-net
    ports:
      - "${CLOUD_BACKUP_API_PORT:-8096}:8080"
    command: ["python3", "-m", "app.api_server"]

  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-backup-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      CLOUD_BACKUP_CONFIG_FILE: /data/config/config.json
      CLOUD_BACKUP_STATE_DIR: /data/state
      CLOUD_BACKUP_ENGINE_URL: http://backup-engine:8091
      CLOUD_BACKUP_API_URL: http://backup-api:8080
    volumes:
      - ${CLOUD_BACKUP_DATA_DIR:-./data}:/data
    depends_on:
      - backup-engine
      - backup-api
    networks:
      - backup-net
    command: ["python3", "-m", "app.scheduler"]

  backup-web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: cloud-backup-web
    restart: unless-stopped
    depends_on:
      - backup-api
    networks:
      - backup-net
    ports:
      - "${CLOUD_BACKUP_WEB_PORT:-8095}:80"

networks:
  backup-net:
    driver: bridge
