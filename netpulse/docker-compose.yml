services:
  netpulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netpulse
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      NETPULSE_DB_PATH: /data/netpulse.sqlite3
      NETPULSE_POLL_INTERVAL_SECONDS: ${NETPULSE_POLL_INTERVAL_SECONDS:-30}
      NETPULSE_LOG_RETENTION_DAYS: ${NETPULSE_LOG_RETENTION_DAYS:-30}
      NETPULSE_LOG_MAX_SIZE_MB: ${NETPULSE_LOG_MAX_SIZE_MB:-100}
      NETPULSE_GRAPH_RETENTION_DAYS: ${NETPULSE_GRAPH_RETENTION_DAYS:-180}
      NETPULSE_DNS_TIMEOUT_SECONDS: ${NETPULSE_DNS_TIMEOUT_SECONDS:-2}
      NETPULSE_TCP_TIMEOUT_SECONDS: ${NETPULSE_TCP_TIMEOUT_SECONDS:-2}
      NETPULSE_DNS_HOSTNAME: ${NETPULSE_DNS_HOSTNAME:-google.com}
      NETPULSE_DNS_RESOLVERS: ${NETPULSE_DNS_RESOLVERS:-1.1.1.1,8.8.8.8}
      NETPULSE_TCP_TARGETS: ${NETPULSE_TCP_TARGETS:-1.1.1.1:53,8.8.8.8:53}
    volumes:
      - ${NETPULSE_DATA_DIR:-./data}:/data
    ports:
      - "${NETPULSE_PORT:-8097}:8080"
